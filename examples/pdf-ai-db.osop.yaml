osop_version: "1.0"
id: esg_pdf_pipeline
name: ESG PDF to AI to DB Pipeline
description: Extract ESG metrics from PDF via AI, validate, then write to DB.
owner: Archie0125
visibility: public
workflow_type:
  primary: data_pipeline
  secondary: [ai_extraction, human_review]
views: [graph, story, role, debug, agent]
schemas:
  ExtractedESGMetrics:
    type: object
    required: [report_id, metrics]
    properties:
      report_id: { type: string }
      metrics:
        type: array
        items:
          type: object
          required: [key, value, unit, source_page]
          properties:
            key: { type: string }
            value: { type: number }
            unit: { type: string }
            source_page: { type: number }
  DbInsertResult:
    type: object
    required: [inserted_rows]
    properties:
      inserted_rows: { type: number }
nodes:
  - id: upload_pdf
    type: human
    purpose: Upload ESG PDF report and generate file reference
    inputs:
      - name: pdf_file
        schema: file/pdf
        required: true
    outputs:
      - name: pdf_file_ref
        schema: file_ref
  - id: extract_metrics
    type: agent
    role: executor
    purpose: Extract ESG metrics from PDF and output structured JSON
    runtime:
      provider: openai
      model: gpt-4o
    inputs:
      - name: pdf_file_ref
        schema: file_ref
        required: true
    outputs:
      - name: extracted
        schema: "#/schemas/ExtractedESGMetrics"
    success_criteria:
      - Output must conform to ExtractedESGMetrics schema
      - Every metric must include source_page
    failure_modes:
      - schema_invalid
      - low_confidence
    retry_policy:
      max_retries: 2
      strategy: exponential_backoff
      backoff_sec: 3
    timeout_sec: 120
    handoff:
      summary_for_next_node: Validate schema and flag low-confidence items.
      expected_output: Validated metrics payload
      escalation: human_review
    security:
      permissions: [artifact.read, llm.call]
      secrets: [OPENAI_API_KEY]
      risk_level: medium
  - id: validate_metrics
    type: docker
    purpose: Validate schema and business rules in reproducible Python environment
    runtime:
      image: python:3.11
      command: "python validate.py"
    inputs:
      - name: extracted
        schema: "#/schemas/ExtractedESGMetrics"
        required: true
    outputs:
      - name: validated
        schema: "#/schemas/ExtractedESGMetrics"
    timeout_sec: 60
    security:
      risk_level: medium
  - id: save_db
    type: db
    purpose: Write validated metrics to PostgreSQL for dashboard consumption
    runtime:
      engine: postgres
      action: insert
      table: esg_metrics
    inputs:
      - name: validated
        schema: "#/schemas/ExtractedESGMetrics"
        required: true
    outputs:
      - name: result
        schema: "#/schemas/DbInsertResult"
    idempotency:
      enabled: true
      key: "run_id + report_id"
    security:
      permissions: [db.write]
      secrets: [DB_PASSWORD]
      risk_level: high
      approval_gate:
        required: true
        approver_role: reviewer
  - id: human_review
    type: human
    role: reviewer
    purpose: Manual review when validation fails or before high-risk DB write
    inputs:
      - name: pending_payload
        schema: object
        required: true
    outputs:
      - name: approval
        schema: object
edges:
  - from: upload_pdf
    to: extract_metrics
  - from: extract_metrics
    to: validate_metrics
  - from: validate_metrics
    to: human_review
    mode: conditional
    when: "validation_failed == true"
  - from: validate_metrics
    to: save_db
  - from: save_db
    to: human_review
    mode: conditional
    when: "approval_gate == true"
tests:
  - id: test_extract_schema
    type: unit
    target_node: extract_metrics
    input:
      pdf_file_ref: "fixtures/sample_esg.pdf"
    expect:
      schema_valid: true
ledger:
  enabled: true
  store: postgres
  artifact_store: s3
evolution:
  enabled: true
  strategy: ai_assisted
  feedback_sources: [logs, metrics, human_feedback]
  output:
    mode: pull_request
    require_human_approval: true
